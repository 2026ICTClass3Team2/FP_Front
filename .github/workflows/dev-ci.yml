name: Dev Branch CI

# 1. When should this run?
on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

# 2. What should it do?
jobs:
  build-frontend:
    name: Build and Test Frontend
    runs-on: ubuntu-latest

    steps:
      # Step A: Grab your code from GitHub
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step B: Set up the exact Node environment (Matching your Dockerfile)
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # This speeds up future builds!

      # Step C: Install packages
      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      # Step D: Run the Vite build (This is what caught your bug last time!)
      - name: Build Project
        run: npm run build

      # Step E: (Optional) Test the Docker build just to make sure the Dockerfile isn't broken
      - name: Test Docker Build
        run: docker build -t education-frontend:test .